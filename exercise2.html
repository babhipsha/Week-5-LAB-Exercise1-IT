<!DOCTYPE html>
<html>
<head>
    <title>Exercise 2</title>
</head>
<body>

<h1>Example on Unordered List</h1>

<ul>
    <li>Sportstar</li>
    <li>Business Week</li>
    <li>Time</li>
</ul>

<h1>Example on Ordered List</h1>

<ol type="i" start="4">
    <li>Sportstar</li>
    <li>Business Week</li>
    <li>Time</li>
</ol>

<h1>Example on Definition List</h1>

<dl>
    <dt><b>Sports Magazine</b></dt>
    <dd>Sportstar</dd>

    <dt><b>Business Magazine</b></dt>
    <dd>Business Week</dd>
</dl>

</body>
</html>
